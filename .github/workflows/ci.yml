name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (warnings are errors)
        run: dotnet build --configuration Release

      - name: Format (verify no changes)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format --verify-no-changes

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  # This repo is itself a catalog: validate it and re-fetch every external asset
  # at its pinned ref so upstream drift (a moved tag, changed content) is caught
  # here instead of on a developer's machine.
  catalog:
    name: Validate catalog & verify external assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate catalog
        run: dotnet run --project src/AgentPack.Cli --configuration Release -- catalog validate

      - name: Check lockfile is up to date
        run: dotnet run --project src/AgentPack.Cli --configuration Release -- catalog lock --check

      - name: Verify external assets
        run: dotnet run --project src/AgentPack.Cli --configuration Release -- catalog verify-external

  pack:
    name: Pack tool
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack src/AgentPack.Cli/AgentPack.Cli.csproj --configuration Release --output ./artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: agentpack-nupkg
          path: artifacts/*.nupkg
