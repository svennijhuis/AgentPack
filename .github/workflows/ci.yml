name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build (warnings are errors)
        run: dotnet build --configuration Release

      - name: Format (verify no changes)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format --verify-no-changes

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  pack:
    name: Pack tool
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack src/AgentPack.Cli/AgentPack.Cli.csproj --configuration Release --output ./artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: agentpack-nupkg
          path: artifacts/*.nupkg

  catalog:
    name: Validate catalog and compile agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet build --configuration Release
      - run: dotnet run --configuration Release --no-build --project src/AgentPack.Cli -- catalog validate
      - run: dotnet run --configuration Release --no-build --project src/AgentPack.Cli -- catalog lock --check
      - run: dotnet run --configuration Release --no-build --project src/AgentPack.Cli -- catalog verify-external
      - run: dotnet run --configuration Release --no-build --project src/AgentPack.Cli -- catalog compile
      - run: dotnet test --configuration Release --no-build
