name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test --configuration Release

      - name: Pack
        run: >
          dotnet pack src/AgentPack.Cli/AgentPack.Cli.csproj
          --configuration Release
          --output ./artifacts
          -p:Version=${{ env.VERSION }}

      # Publishes to nuget.org so `dotnet tool install -g AgentPack` works without
      # --add-source. Create an API key at https://www.nuget.org/account/apikeys
      # and add it as the NUGET_API_KEY repository secret. Skipped if unset.
      # Override NUGET_FEED_URL (repository variable) to push to a different feed.
      - name: Push to NuGet
        if: ${{ secrets.NUGET_API_KEY != '' }}
        run: >
          dotnet nuget push artifacts/*.nupkg
          --source "${{ vars.NUGET_FEED_URL || 'https://api.nuget.org/v3/index.json' }}"
          --api-key "${{ secrets.NUGET_API_KEY }}"

      - name: Publish self-contained binaries
        run: |
          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish src/AgentPack.Cli/AgentPack.Cli.csproj \
              --configuration Release \
              --runtime "$rid" \
              --self-contained true \
              -p:Version=${{ env.VERSION }} \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -p:DebugType=none \
              --output "./publish/$rid"
            if [[ "$rid" == win-* ]]; then
              (cd "./publish/$rid" && zip -r "../../artifacts/agentpack-${VERSION}-${rid}.zip" .)
            else
              tar -czf "./artifacts/agentpack-${VERSION}-${rid}.tar.gz" -C "./publish/$rid" .
            fi
          done

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/agentpack-*
          generate_release_notes: true
