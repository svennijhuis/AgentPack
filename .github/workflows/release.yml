name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # A tag can be pushed independently of CI, so the release gates on the same
  # three-OS test matrix instead of trusting whatever ran (or didn't) before it.
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test --configuration Release

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack
        run: >
          dotnet pack src/AgentPack.Cli/AgentPack.Cli.csproj
          --configuration Release
          --output ./artifacts
          -p:Version=${{ env.VERSION }}

      # Exchange GitHub's short-lived OIDC token for a temporary nuget.org API key.
      # The matching Trusted Publisher policy is registered for this repository and
      # workflow, so no long-lived publishing secret is stored in GitHub.
      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: svennijhuis

      - name: Push to NuGet.org
        run: >
          dotnet nuget push artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
          --skip-duplicate

      - name: Push to GitHub Packages
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "$GITHUB_PACKAGES_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push artifacts/*.nupkg --source github --skip-duplicate

      - name: Publish self-contained binaries
        run: |
          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish src/AgentPack.Cli/AgentPack.Cli.csproj \
              --configuration Release \
              --runtime "$rid" \
              --self-contained true \
              -p:Version=${{ env.VERSION }} \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -p:DebugType=none \
              --output "./publish/$rid"
            if [[ "$rid" == win-* ]]; then
              (cd "./publish/$rid" && zip -r "../../artifacts/agentpack-${VERSION}-${rid}.zip" .)
            else
              tar -czf "./artifacts/agentpack-${VERSION}-${rid}.tar.gz" -C "./publish/$rid" .
            fi
          done

      - name: Checksums
        run: (cd artifacts && sha256sum agentpack-* *.nupkg > SHA256SUMS)

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.nupkg
            artifacts/agentpack-*
            artifacts/SHA256SUMS
          generate_release_notes: true
