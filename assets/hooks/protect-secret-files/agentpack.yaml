# Asset manifest. Id and kind come from the folder path (assets/<kind>/<id>/).
name: 'Protect Secret Files'
version: 1.0.0
description: 'Block the agent from writing or editing likely secret files (.env, *.pem, *.key, id_rsa, credentials, .npmrc). Complements secret-scan, which inspects Bash command content instead of write targets. Uses the Claude hook schema, so Claude/Codex only.'
groups: ['security']
tags: ['safety', 'policy']
owner: 'security-platform'
providers: ['claude', 'codex']
status: experimental
channel: beta
hook:
  trigger: preToolUse
  tool: 'Edit|Write'
  command: 'hook.sh'
  timeoutSec: 15
