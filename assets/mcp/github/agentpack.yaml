# Asset manifest. Id and kind come from the folder path (assets/<kind>/<id>/).
name: GitHub MCP
version: 1.0.0
description: Example GitHub MCP configuration that expects GITHUB_TOKEN.
groups: [engineering, backend]
tags: [mcp]
# providers omitted = available for all providers
owner: developer-platform
mcp:
  server: github
  transport: stdio
  command: github-mcp-server
  envVars: [GITHUB_TOKEN]
