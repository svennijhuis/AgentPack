# Asset manifest. Id and kind come from the folder path (assets/<kind>/<id>/).
name: 'Sequential Thinking MCP'
version: 1.0.0
description: 'Structured step-by-step reasoning server that gives the agent an explicit scratchpad for multi-step problems. Runs locally via npx; no credentials.'
groups: ['engineering']
tags: ['mcp', 'reasoning']
owner: 'developer-platform'
# providers omitted = available for all providers
status: experimental
channel: beta
mcp:
  server: 'sequential-thinking'
  transport: stdio
  command: 'npx'
  args: ['-y', '@modelcontextprotocol/server-sequential-thinking']
